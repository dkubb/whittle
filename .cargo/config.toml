[alias]
clippy-all = ["clippy", "--all-features", "--all-targets", "--tests", "--workspace"]
coverage = [
  "llvm-cov",
  "nextest",
  "--all-features",
  "--branch",
  "--cargo-quiet",
  "--fail-uncovered-functions",
  "0",
  "--fail-uncovered-lines",
  "0",
  "--fail-uncovered-regions",
  "0",
  "--final-status-level",
  "fail",
  "--no-cfg-coverage",
  "--no-cfg-coverage-nightly",
  "--status-level",
  "fail",
  "--summary-only",
  "--workspace",
]
fmt-all = ["fmt", "--all"]
test-all = [
  "nextest",
  "run",
  "--all-features",
  "--workspace",
  "--cargo-quiet",
  "--show-progress",
  "none",
  "--status-level",
  "fail",
  "--final-status-level",
  "fail",
  "--success-output",
  "never",
]
test-doc = ["test", "--doc", "--all-features", "--workspace"]

[build]
rustflags = [
  "--deny",
  "unsafe_code",
  "--deny",
  "warnings",
]

[deny]
config = ".cargo/deny.toml"

[env]
CLIPPY_CONF_DIR = { value = ".cargo", relative = true }
MACOSX_DEPLOYMENT_TARGET = "26.0"
