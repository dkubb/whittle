[alias]
clippy-all = ["clippy", "--all-features", "--all-targets", "--tests", "--workspace"]
coverage = [
  "llvm-cov",
  "nextest",
  "--all-features",
  "--branch",
  "--cargo-quiet",
  "--fail-uncovered-functions",
  "0",
  "--fail-uncovered-lines",
  "0",
  "--fail-uncovered-regions",
  "0",
  "--final-status-level",
  "fail",
  # whittle-macros is a proc-macro crate: its code runs inside the
  # compiler during expansion, not inside the test binaries, so
  # cargo-llvm-cov cannot observe its execution and reports it as
  # uncovered. Its runtime output (`Pattern<RE>`) is fully covered by
  # whittle-core's tests, and its expansion is exercised by the facade
  # `pattern!` tests + the compile-fail doctest. Exclude its source
  # from the line/region/function gate rather than lowering any
  # threshold.
  "--ignore-filename-regex",
  "crates/whittle-macros/",
  "--no-cfg-coverage",
  "--no-cfg-coverage-nightly",
  "--status-level",
  "fail",
  "--summary-only",
  "--workspace",
]
fmt-all = ["fmt", "--all"]
test-all = [
  "nextest",
  "run",
  "--all-features",
  "--workspace",
  "--cargo-quiet",
  "--show-progress",
  "none",
  "--status-level",
  "fail",
  "--final-status-level",
  "fail",
  "--success-output",
  "never",
]
test-doc = ["test", "--doc", "--all-features", "--workspace"]

[deny]
config = ".cargo/deny.toml"

[env]
CLIPPY_CONF_DIR = { value = ".cargo", relative = true }
MACOSX_DEPLOYMENT_TARGET = "26.0"
